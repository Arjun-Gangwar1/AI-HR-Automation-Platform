services:
  hr-ai-agent:
    build: .
    container_name: hr-ai-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Optional: run the agent on a free/alternate backend instead of OpenAI.
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    stdin_open: true
    ports:
      - "5000"
    tty: true
    networks:
      - agents-net

networks:
  agents-net:
    external: true
